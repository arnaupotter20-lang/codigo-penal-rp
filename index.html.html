    function renderArticulo(numero, datos) {
      return `
        <div class="card">
          <h2 class="article-title">Artículo ${numero}</h2>
          <div class="field"><span class="label">Texto:</span> ${datos.texto}</div>
          <div class="field"><span class="label">Multa:</span> ${datos.multa}</div>
          <div class="field"><span class="label">Cárcel:</span> ${datos.carcel}</div>
          <div class="field"><span class="label">Pérdida de puntos:</span> ${datos.puntos}</div>
          <div class="field"><span class="label">Observaciones:</span> ${datos.observaciones || "—"}</div>
        </div>
      `;
    }

    function buscarArticulo() {
      const entrada = document.getElementById("busqueda").value.trim().toLowerCase();
      const resultado = document.getElementById("resultado");

      if (!entrada) {
        resultado.innerHTML = '<div class="small">Introduce un artículo o texto para buscar.</div>';
        return;
      }

      if (articulos[entrada]) {
        resultado.innerHTML = renderArticulo(entrada, articulos[entrada]);
        return;
      }

      const coincidencias = Object.entries(articulos).filter(([numero, datos]) => {
        return (
          numero.toLowerCase().includes(entrada) ||
          datos.texto.toLowerCase().includes(entrada) ||
          datos.multa.toLowerCase().includes(entrada) ||
          datos.carcel.toLowerCase().includes(entrada) ||
          datos.puntos.toLowerCase().includes(entrada) ||
          (datos.observaciones && datos.observaciones.toLowerCase().includes(entrada))
        );
      });

      if (coincidencias.length === 0) {
        resultado.innerHTML = '<div class="card">No se ha encontrado ningún artículo.</div>';
        return;
      }

      resultado.innerHTML = `
        <div class="small" style="margin-bottom:10px;">Resultados encontrados: ${coincidencias.length}</div>
        ${coincidencias.map(([numero, datos]) => `
          <div class="list-item">
            <div><b>Artículo ${numero}</b> — ${datos.texto}</div>
            <div class="small">Multa: ${datos.multa} | Cárcel: ${datos.carcel} | Puntos: ${datos.puntos}</div>
          </div>
        `).join("")}
      `;
    }

    function limpiarBusqueda() {
      document.getElementById("busqueda").value = "";
      document.getElementById("resultado").innerHTML = "";
    }

    document.getElementById("busqueda").addEventListener("keydown", function(e) {
      if (e.key === "Enter") buscarArticulo();
    });
  </script>
